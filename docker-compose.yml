services:
  backend:
    image: ${BACKEND_IMAGE:-dyslexai-backend:latest}
    container_name: dyslexai-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/uploads/dyslexia.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    volumes:
      - backend_data:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/users', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  frontend:
    image: ${FRONTEND_IMAGE:-dyslexai-frontend:latest}
    container_name: dyslexai-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  backend_data:
