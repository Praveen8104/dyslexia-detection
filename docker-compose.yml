version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/saved_models:/app/saved_models
      - uploads:/app/uploads
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///dyslexia.db
      - CORS_ORIGINS=http://localhost,http://localhost:80
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads:
